name: Scrape Grocery Prices

on:
  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

  # Automatic schedule: every 2 weeks on Monday at 8am EST
  schedule:
    - cron: "0 13 1,15 * *"  # 1st and 15th of each month, 1pm UTC = 8am EST

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run price scraper
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: npm run scrape

      - name: Upload price data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grocery-prices
          path: grocery_prices.json
          if-no-files-found: ignore
